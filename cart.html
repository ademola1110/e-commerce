<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body class="bg-white p-5">
    <h1
      class="text-3xl font-bold mb-5 text-center bg-orange-400 text-white p-3 rounded-lg"
    >
      🛒 Your Cart
    </h1>
    <div
      id="cartContainer"
      class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 p-5 rounded-lg"
    ></div>
    <h2
      class="text-2xl font-bold mt-5 text-center bg-white p-3 rounded-lg w-[200px] ml-auto shadow-lg border-2 border-orange-500"
    >
      Grand Total: $<span id="grandTotal" class="text-orange-500">0</span>
    </h2>
    <div class="flex justify-center mt-[20px] pb-[40px]">
      <a
        class="text-center p-[20px] text-[20px] font-bold mt-[20px] bg-orange-500 text-white w-[300px] rounded-lg"
        href="product.html"
        >Back to Products Page</a
      >
    </div>
    <a
      href="#"
      id="scroll-top"
      class="w-10 h-10 text-white fixed bottom-10 right-10 bg-orange-500 rounded-[100%]"
      ><i class="fa-solid fa-arrow-up mx-[9px] my-3"></i
    ></a>

    <script>
      const cartContainer = document.getElementById("cartContainer");

      function updateCartBadge() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        let totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);

        let badge = document.getElementById("cart-count");

        if (!badge) return; // ✅ VERY IMPORTANT (prevents error)

        if (totalQty > 0) {
          badge.classList.remove("hidden");
          badge.innerText = totalQty;
        } else {
          badge.classList.add("hidden");
        }
      }

      updateCartBadge();

      // Display cart items
      function displayCart() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        if (cart.length === 0) {
          cartContainer.innerHTML =
            "<p class='text-center text-[20px] col-span-full'>Cart is empty</p>";

          document.getElementById("grandTotal").innerText = 0;
          return;
        }

        let grandTotal = 0;

        cartContainer.innerHTML = cart
          .map((item) => {
            let itemTotal = item.price * item.quantity;

            grandTotal += itemTotal;

            return `
        <div class="bg-white p-5 rounded shadow text-center">
          <img src="${item.image}" class="w-full h-[150px] object-cover mb-3 rounded">
          <h2 class="font-bold mb-2">${item.name}</h2>
          <p class="text-orange-500 font-bold mb-2">$${item.price}</p>
          <p class="font-bold mb-2">Quantity: ${item.quantity}</p>
          <p class="mt-2 font-bold">Total: <span class="text-orange-500"> $${itemTotal} </span></p>
          <button onclick="removeFromCart(${item.id})"
            class="mt-3 bg-red-600 text-white px-4 py-2 rounded hover:bg-red-500">
            Remove
          </button>
        </div>
      `;
          })
          .join("");

        //  DISPLAY FINAL TOTAL
        document.getElementById("grandTotal").innerText = grandTotal;
      }

      // Remove item from cart
      function removeFromCart(id) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart = cart.filter((item) => item.id != id);

        localStorage.setItem("cart", JSON.stringify(cart));

        displayCart();
        // updateCartBadge(); // ✅ ADD THIS
      }

      updateCartBadge();

      displayCart();

      const scrollTopBtn = document.getElementById("scroll-top");

      scrollTopBtn.addEventListener("click", function (e) {
        e.preventDefault();

        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      });
    </script>
  </body>
</html>

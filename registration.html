<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="text-white bg-orange-400 shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <!-- Logo -->
          <div class="flex-shrink-0 text-2xl font-bold">RIT BUSINESS</div>

          <!-- Menu Links -->
          <div class="hidden md:hidden lg:flex space-x-6">
            <a href="index.html" class="hover:text-green-600 font-medium"
              >Homepage</a
            >
            <a href="about.html" class="hover:text-green-600 font-medium"
              >About</a
            >
            <a href="product.html" class="hover:text-green-600 font-medium"
              >Products</a
            >
            <a href="contact.html" class="hover:text-green-600 font-medium"
              >Contacts</a
            >
          </div>

          <!-- Right Section -->
          <div class="flex items-center space-x-4">
            <div class="hidden md:flex space-x-4">
              <a
                href="registration.html"
                class="hover:text-green-600 font-medium"
                >Register</a
              >
              <a href="login.html" class="hover:text-green-600 font-medium"
                >LogIn</a
              >
            </div>

            <!-- Language Dropdown -->
            <div class="relative">
              <button
                id="langBtn"
                class="flex items-center hover:text-green-600 font-medium focus:outline-none"
              >
                <i class="fa-solid fa-globe mr-1"></i>EN
                <i class="fa-solid fa-chevron-down ml-1"></i>
              </button>
              <div
                id="langMenu"
                class="absolute right-0 mt-2 w-24 bg-white border rounded shadow-lg hidden"
              >
                <a
                  href="#"
                  class="block px-4 py-2 hover:bg-green-100 text-black"
                  >EN</a
                >
                <a
                  href="#"
                  class="block px-4 py-2 hover:bg-green-100 text-black"
                  >FR</a
                >
                <a
                  href="#"
                  class="block px-4 py-2 hover:bg-green-100 text-black"
                  >ES</a
                >
              </div>
            </div>

            <!-- Cart -->
            <div>
              <a
                href="cart.html"
                class="text-white hover:text-green-600 text-xl"
              >
                <i class="fa-solid fa-cart-arrow-down"></i>
              </a>
            </div>

            <!-- Mobile Menu Button -->
            <div class="md:block lg:hidden">
              <button
                id="mobileBtn"
                class="text-white hover:text-green-600 focus:outline-none text-2xl"
              >
                <i class="fa-solid fa-bars"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="text-white hidden mt-2 space-y-2">
          <a
            href="index.html"
            class="md:block px-4 py-2 hover:bg-green-100 rounded"
            >Home page</a
          >
          <a
            href="about.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >About</a
          >
          <a
            href="product.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >Products</a
          >
          <a
            href="contact.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >Contacts</a
          >
          <a
            href="registration.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >Register</a
          >
          <a
            href="login.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >Log In</a
          >
        </div>
      </div>
    </nav>
    <form
      id="form"
      action=""
      class="flex justify-center items-center h-screen bg-gray-200"
    >
      <div class="w-[280px] bg-gray-400 p-6 rounded-lg text-center shadow-lg">
        <p class="py-4 font-bold text-2xl">SIGN UP</p>

        <input
          type="text"
          placeholder="First Name"
          id="fname"
          oninput="onlyText(this)"
          class="w-[80%] h-8 mb-4 px-2 text-sm bg-white outline-none rounded"
        />

        <input
          type="text"
          placeholder="Last Name"
          id="lname"
          oninput="onlyText(this)"
          class="w-[80%] h-8 mb-4 px-2 text-sm bg-white outline-none rounded"
        />

        <input
          type="text"
          placeholder="Email"
          id="Email"
          oninput="email(this)"
          class="w-[80%] h-8 mb-4 px-2 text-sm bg-white outline-none rounded"
        />

        <input
          type="password"
          placeholder="Password"
          id="password"
          oninput="mixture(this)"
          class="w-[80%] h-8 mb-4 px-2 text-sm bg-white outline-none rounded"
        />

        <input
          type="password"
          placeholder="Confirm Password"
          id="confirmPassword"
          oninput="mixture(this)"
          class="w-[80%] h-8 mb-4 px-2 text-sm bg-white outline-none rounded"
        />

        <input
          type="submit"
          value="Submit"
          class="mt-2 w-[80%] py-2 bg-green-600 text-white rounded-lg cursor-pointer hover:bg-green-700 transition"
        />

        <p id="result" class="mt-3 text-sm text-red-600"></p>
      </div>
    </form>
    <script src="registration.js"></script>
  </body>
</html>

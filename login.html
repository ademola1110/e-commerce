<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="text-white bg-orange-400 shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <!-- Logo -->
          <div class="flex-shrink-0 text-2xl font-bold">RIT BUSINESS</div>

          <!-- Menu Links -->
          <div class="hidden md:hidden lg:flex space-x-6">
            <a href="index.html" class="hover:text-green-600 font-medium"
              >Homepage</a
            >
            <a href="about.html" class="hover:text-green-600 font-medium"
              >About</a
            >
            <a href="product.html" class="hover:text-green-600 font-medium"
              >Products</a
            >
            <a href="contact.html" class="hover:text-green-600 font-medium"
              >Contacts</a
            >
          </div>

          <!-- Right Section -->
          <div class="flex items-center space-x-4">
            <div class="hidden md:flex space-x-4">
              <a
                href="registration.html"
                class="hover:text-green-600 font-medium"
                >Register</a
              >
              <a href="login.html" class="hover:text-green-600 font-medium"
                >LogIn</a
              >
            </div>

            <!-- Language Dropdown -->
            <div class="relative">
              <button
                id="langBtn"
                class="flex items-center hover:text-green-600 font-medium focus:outline-none"
              >
                <i class="fa-solid fa-globe mr-1"></i>EN
                <i class="fa-solid fa-chevron-down ml-1"></i>
              </button>
              <div
                id="langMenu"
                class="absolute right-0 mt-2 w-24 bg-white border rounded shadow-lg hidden"
              >
                <a
                  href="#"
                  class="block px-4 py-2 hover:bg-green-100 text-black"
                  >EN</a
                >
                <a
                  href="#"
                  class="block px-4 py-2 hover:bg-green-100 text-black"
                  >FR</a
                >
                <a
                  href="#"
                  class="block px-4 py-2 hover:bg-green-100 text-black"
                  >ES</a
                >
              </div>
            </div>

            <!-- Cart -->
            <div>
              <a
                href="cart.html"
                class="text-white hover:text-green-600 text-xl"
              >
                <i class="fa-solid fa-cart-arrow-down"></i>
              </a>
            </div>

            <!-- Mobile Menu Button -->
            <div class="md:block lg:hidden">
              <button
                id="mobileBtn"
                class="text-white hover:text-green-600 focus:outline-none text-2xl"
              >
                <i class="fa-solid fa-bars"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="text-white hidden mt-2 space-y-2">
          <a
            href="index.html"
            class="md:block px-4 py-2 hover:bg-green-100 rounded"
            >Home page</a
          >
          <a
            href="about.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >About</a
          >
          <a
            href="product.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >Products</a
          >
          <a
            href="contact.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >Contacts</a
          >
          <a
            href="registration.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >Register</a
          >
          <a
            href="login.html"
            class="block px-4 py-2 hover:bg-green-100 rounded"
            >Log In</a
          >
        </div>
      </div>
    </nav>
    <div action="" class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-md bg-gray-100 rounded-2xl shadow-lg p-8">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-2">
          Login Form
        </h2>
        <p class="text-center text-gray-500 text-sm mb-6">
          Please enter your credentials to login to your account.
        </p>

        <form id="myform">
          <div class="mb-4">
            <label for="" class="block text-sm font-medium text-gray-700 mb-2">
              Username</label
            >

            <input
              type="text"
              id="loginUsername"
              placeholder="Enter username"
              oninput="mixture(this)"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-400"
            />
          </div>

          <div class="mb-5">
            <label for="" class="block text-sm font-medium text-gray-700 mb-2">
              Password</label
            >

            <input
              type="password"
              id="loginPassword"
              placeholder="Enter password"
              oninput="mixture(this)"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-400"
            />
          </div>

          <button
            type="submit"
            class="w-full bg-green-600 text-white py-3 rounded-xl font-medium"
          >
            Submit
          </button>
        </form>

        <p id="result" class="mt-4 text-center font-medium"></p>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
